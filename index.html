<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>間食カロリー管理 - 不死鳥のv11</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* すべての要素のサイズ計算を枠線の内側に限定する */
        * { box-sizing: border-box; }
        
        body { 
            font-family: sans-serif; background-color: #f4f7f6; color: #333; 
            padding: 10px; margin: 0; 
        }
        
        .container { 
            background-color: #fff; padding: 20px; border-radius: 10px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; max-width: 600px; 
            margin: 0 auto;
        }
        
        h2 { text-align: center; color: #2c3e50; margin-top: 0; }
        h3 { color: #16a085; font-size: 1.1em; border-bottom: 2px solid #1abc9c; padding-bottom: 5px; margin-top: 25px; }
        
        .flex-row { display: block; width: 100%; }
        .input-group { display: block; width: 100%; margin-bottom: 15px; }
        
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        
        /* ⬇︎ スマホの頑固な初期デザインを強制解除（-webkit-appearance: none;） ⬇︎ */
        input, select { 
            -webkit-appearance: none; /* スマホ特有の装飾を消す */
            appearance: none;
            display: block; width: 100%; max-width: 100%; margin: 0; padding: 10px; 
            border: 1px solid #ccc; border-radius: 5px; font-size: 16px; background-color: #fff;
            min-width: 0; /* 強制的に縮むことを許可する */
        }
        
        button { 
            display: block; width: 100%; margin: 0; padding: 12px; background-color: #27ae60; 
            color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; 
        }
        button:hover { background-color: #2ecc71; }
        
        /* ⬇︎ 画面が広い時（PC用）は横並び ⬇︎ */
        @media (min-width: 600px) {
            .flex-row { display: flex; flex-direction: row; gap: 10px; align-items: flex-end; }
            .flex-row .input-group { flex: 1; margin-bottom: 0; }
            .flex-row button { width: auto; min-width: 80px; margin-top: 0; }
        }

        /* ⬇︎ スマホの画面が極端に狭い時、白い枠の余白を削ってボタンの場所を確保する ⬇︎ */
        @media (max-width: 400px) {
            .container { padding: 15px 10px; } /* 左右の余白を減らす */
            input, select { padding: 8px; font-size: 14px; } /* 文字と隙間を少しだけ小さくする */
        }
        
        .plan-box { background-color: #e8f8f5; padding: 15px; border-radius: 5px; border-left: 5px solid #1abc9c; margin-bottom: 20px; }
        .stat-box { background-color: #fcf3cf; padding: 15px; border-radius: 5px; border-left: 5px solid #f1c40f; margin-bottom: 15px; font-size: 0.9em; line-height: 1.5; }
        .alert-text { color: #e74c3c; font-weight: bold; margin-top: 5px; display: block; }
        
        .preset-area { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .preset-item { display: inline-flex; align-items: center; background: #3498db; color: white; border-radius: 20px; padding: 6px 14px; font-size: 0.9em; }
        .preset-name { cursor: pointer; margin-right: 8px; }
        .preset-del { cursor: pointer; background: rgba(0,0,0,0.2); border-radius: 50%; width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; }
        .preset-del:hover { background: #e74c3c; }

        .result { margin-top: 20px; text-align: center; }
        progress { width: 100%; height: 25px; margin-top: 10px; }
        .remaining-text { font-size: 1.5em; font-weight: bold; color: #e74c3c; margin-top: 5px;}
        
        .btn-export { background-color: #f39c12; margin-top: 20px; }
        .btn-export:hover { background-color: #e67e22; }
        .btn-danger { background-color: #95a5a6; font-size: 12px; margin-top: 40px; }
        
        .chart-wrapper { width: 100%; max-width: 100%; overflow: hidden; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>間食カロリー管理</h2>

    <h3>📝 目標設定</h3>
    <div class="flex-row">
        <div class="input-group"><label>開始日</label><input type="date" id="startDate" onchange="saveAndRefresh()"></div>
        <div class="input-group"><label>終了日</label><input type="date" id="endDate" onchange="saveAndRefresh()"></div>
    </div>
    <div class="input-group">
        <label>目標カロリー (kcal)</label>
        <input type="number" id="targetCalorie" value="1500" onchange="saveAndRefresh()">
    </div>
    <div class="plan-box" id="planDisplay"></div>

    <h3>🍪 おやつプリセット</h3>
    <div class="flex-row">
        <div class="input-group"><label>名前</label><input type="text" id="pName" placeholder="チョコ"></div>
        <div class="input-group"><label>kcal</label><input type="number" id="pCal" placeholder="50"></div>
        <button onclick="addPreset()">登録</button>
    </div>
    <div id="presetList" class="preset-area"></div>

    <h3>🍽️ 今日の記録</h3>
    <div class="flex-row">
        <div class="input-group"><label>記録日</label><input type="date" id="recordDate"></div>
        <div class="input-group"><label>名前（任意）</label><input type="text" id="eatenName" placeholder="おやつ名"></div>
        <div class="input-group"><label>kcal</label><input type="number" id="eatenCalorie" placeholder="0"></div>
    </div>
    <button onclick="addRecord()">記録する</button>

    <div class="result">
        <p>期間合計: <span id="totalEaten">0</span> kcal / <progress id="calorieBar"></progress></p>
        <div class="remaining-text">残り <span id="remainingCalorie">0</span> kcal</div>
    </div>

    <h3>📊 統計・分析（最大30日間）</h3>
    
    <div id="statSummary" class="stat-box">データがありません</div>

    <div class="flex-row">
        <div class="input-group"><label>分析モード</label>
            <select id="chartType" onchange="drawChart()">
                <option value="bar">📈 日別推移 ＆ 7日移動平均</option>
                <option value="pie">🍕 おやつ内訳 (円グラフ)</option>
                <option value="weekday">📅 曜日別 平均カロリー</option>
                <option value="histogram">📊 カロリー度数分布</option>
            </select>
        </div>
    </div>
    <div class="flex-row">
        <div class="input-group"><label>表示開始</label><input type="date" id="chartStartDate" onchange="drawChart()"></div>
        <div class="input-group"><label>表示終了</label><input type="date" id="chartEndDate" onchange="drawChart()"></div>
    </div>
    
    <div class="chart-wrapper">
        <canvas id="calorieChart"></canvas>
    </div>
    
    <button onclick="exportCSV()" class="btn-export">📥 記録をCSVでダウンロード</button>
    <button onclick="clearAllData()" class="btn-danger">全リセット</button>
</div>

<script>
    let appData = { history: [], presets: [] };
    let myChart = null;

    function saveToLocal() {
        appData.settings = {
            start: document.getElementById('startDate').value,
            end: document.getElementById('endDate').value,
            target: document.getElementById('targetCalorie').value,
            cStart: document.getElementById('chartStartDate').value,
            cEnd: document.getElementById('chartEndDate').value,
            cType: document.getElementById('chartType').value
        };
        localStorage.setItem('dietAppData_v6', JSON.stringify(appData));
    }

    function loadFromLocal() {
        const saved = localStorage.getItem('dietAppData_v6');
        if (saved) {
            appData = JSON.parse(saved);
            const s = appData.settings || {};
            document.getElementById('startDate').value = s.start || "";
            document.getElementById('endDate').value = s.end || "";
            document.getElementById('targetCalorie').value = s.target || 1500;
            document.getElementById('chartStartDate').value = s.cStart || "";
            document.getElementById('chartEndDate').value = s.cEnd || "";
            document.getElementById('chartType').value = s.cType || "bar";
            renderPresets();
        } else {
            initDates();
        }
    }

    function initDates() {
        const today = new Date().toISOString().split('T')[0];
        const nextWeek = new Date();
        nextWeek.setDate(new Date().getDate() + 6);
        const nextStr = nextWeek.toISOString().split('T')[0];
        document.getElementById('startDate').value = today;
        document.getElementById('endDate').value = nextStr;
        
        const lastMonth = new Date();
        lastMonth.setDate(lastMonth.getDate() - 29);
        document.getElementById('chartStartDate').value = lastMonth.toISOString().split('T')[0];
        document.getElementById('chartEndDate').value = today;
        document.getElementById('recordDate').value = today;
    }

    function addPreset() {
        const name = document.getElementById('pName').value;
        const cal = parseInt(document.getElementById('pCal').value);
        if (!name || isNaN(cal)) return;
        appData.presets.push({ name, cal });
        document.getElementById('pName').value = '';
        document.getElementById('pCal').value = '';
        renderPresets();
        saveToLocal();
    }

    function deletePreset(index) {
        appData.presets.splice(index, 1);
        renderPresets();
        saveToLocal();
    }

    function renderPresets() {
        const list = document.getElementById('presetList');
        list.innerHTML = '';
        appData.presets.forEach((p, index) => {
            const container = document.createElement('div');
            container.className = 'preset-item';
            container.innerHTML = `<span class="preset-name" onclick="quickAdd('${p.name}', ${p.cal})">${p.name} (${p.cal}k)</span><span class="preset-del" onclick="deletePreset(${index})">×</span>`;
            list.appendChild(container);
        });
    }

    function quickAdd(name, cal) {
        document.getElementById('eatenName').value = name;
        document.getElementById('eatenCalorie').value = cal;
        addRecord();
    }

    function saveAndRefresh() {
        saveToLocal();
        updateDisplay();
    }

    function addRecord() {
        const date = document.getElementById('recordDate').value;
        const name = document.getElementById('eatenName').value || "その他";
        const eaten = parseInt(document.getElementById('eatenCalorie').value);
        if (!date || isNaN(eaten) || eaten < 0) return;
        
        appData.history.push({ date, name, cal: eaten });
        document.getElementById('eatenCalorie').value = '';
        document.getElementById('eatenName').value = '';
        saveAndRefresh();
    }

    function updateDisplay() {
        const startVal = document.getElementById('startDate').value;
        const endVal = document.getElementById('endDate').value;
        const target = parseInt(document.getElementById('targetCalorie').value) || 0;

        if(startVal && endVal) {
            const diffDays = Math.floor((new Date(endVal) - new Date(startVal)) / (1000*60*60*24)) + 1;
            const daily = diffDays > 0 ? Math.floor(target / diffDays) : 0;
            document.getElementById('planDisplay').innerHTML = `<strong>${diffDays}日間</strong> / 目安 <strong>${daily} kcal/日</strong>`;
        }

        let total = 0;
        const s = new Date(startVal);
        const e = new Date(endVal);
        appData.history.forEach(r => {
            const rDate = new Date(r.date);
            if (rDate >= s && rDate <= e) total += r.cal;
        });
        
        document.getElementById('totalEaten').innerText = total;
        document.getElementById('remainingCalorie').innerText = Math.max(0, target - total);
        const bar = document.getElementById('calorieBar');
        bar.max = target; bar.value = total;

        drawChart();
    }

    function calculateStats(dataArray) {
        if (dataArray.length === 0) return { mean: 0, median: 0, stdDev: 0 };
        const sum = dataArray.reduce((a, b) => a + b, 0);
        const mean = sum / dataArray.length;
        
        const sorted = [...dataArray].sort((a, b) => a - b);
        const mid = Math.floor(sorted.length / 2);
        const median = sorted.length % 2 !== 0 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
        
        const variance = dataArray.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / dataArray.length;
        const stdDev = Math.sqrt(variance);
        
        return { mean, median, stdDev };
    }

    function drawChart() {
        const ctx = document.getElementById('calorieChart').getContext('2d');
        const sDate = new Date(document.getElementById('chartStartDate').value);
        const eDate = new Date(document.getElementById('chartEndDate').value);
        const type = document.getElementById('chartType').value;

        if (myChart) myChart.destroy();

        let dailySums = {};
        let curr = new Date(sDate);
        let validDaysCount = 0;
        
        while (curr <= eDate && validDaysCount < 30) {
            const dStr = curr.toISOString().split('T')[0];
            dailySums[dStr] = appData.history.filter(r => r.date === dStr).reduce((sum, r) => sum + r.cal, 0);
            curr.setDate(curr.getDate() + 1);
            validDaysCount++;
        }

        const dailyValuesArray = Object.values(dailySums);
        const stats = calculateStats(dailyValuesArray);

        let statHtml = `<strong>表示期間の統計</strong><br>
                        平均: <strong>${Math.round(stats.mean)}</strong> kcal / 日<br>
                        中央値: <strong>${Math.round(stats.median)}</strong> kcal / 日<br>
                        標準偏差 (ばらつき): <strong>${Math.round(stats.stdDev)}</strong>`;
        
        const threshold = stats.mean + (2 * stats.stdDev);
        let alertDays = [];
        for (let d in dailySums) {
            if (stats.stdDev > 0 && dailySums[d] > threshold) {
                alertDays.push(`${d} (${dailySums[d]}kcal)`);
            }
        }
        
        if (alertDays.length > 0) {
            statHtml += `<br><span class="alert-text">⚠️ 異常値アラート (平均+2σ超え):<br>${alertDays.join(', ')}</span>`;
        }
        document.getElementById('statSummary').innerHTML = dailyValuesArray.length > 0 ? statHtml : "データがありません";

        if (type === 'bar') {
            const labels = Object.keys(dailySums);
            const data = Object.values(dailySums);
            
            let maData = [];
            for (let i = 0; i < data.length; i++) {
                if (i < 6) {
                    maData.push(null); 
                } else {
                    let sum = 0;
                    for (let j = 0; j < 7; j++) sum += data[i - j];
                    maData.push(Math.round(sum / 7));
                }
            }

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [
                        { type: 'line', label: '7日移動平均', data: maData, borderColor: '#e74c3c', borderWidth: 3, tension: 0.3, fill: false },
                        { type: 'bar', label: '日別摂取kcal', data, backgroundColor: '#3498db', borderRadius: 4 }
                    ]
                },
                options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
            });

        } else if (type === 'pie') {
            let counts = {};
            appData.history.forEach(r => {
                const rd = new Date(r.date);
                if (rd >= sDate && rd <= eDate) {
                    counts[r.name] = (counts[r.name] || 0) + r.cal;
                }
            });
            myChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: Object.keys(counts),
                    datasets: [{ data: Object.values(counts), backgroundColor: ['#e74c3c', '#f1c40f', '#2ecc71', '#9b59b6', '#34495e', '#e67e22'] }]
                },
                options: { maintainAspectRatio: false }
            });

        } else if (type === 'weekday') {
            const weekNames = ['日', '月', '火', '水', '木', '金', '土'];
            let weekSums = [0, 0, 0, 0, 0, 0, 0];
            let weekCounts = [0, 0, 0, 0, 0, 0, 0];

            for (let dStr in dailySums) {
                const dayIndex = new Date(dStr).getDay();
                weekSums[dayIndex] += dailySums[dStr];
                weekCounts[dayIndex]++;
            }
            const weekAvgs = weekSums.map((sum, i) => weekCounts[i] > 0 ? Math.round(sum / weekCounts[i]) : 0);

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: weekNames,
                    datasets: [{ label: '曜日別 平均摂取kcal', data: weekAvgs, backgroundColor: '#9b59b6', borderRadius: 4 }]
                },
                options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
            });

        } else if (type === 'histogram') {
            const maxCal = Math.max(...dailyValuesArray, 1000);
            const binSize = 200; 
            const numBins = Math.ceil(maxCal / binSize) + 1;
            let bins = new Array(numBins).fill(0);
            
            dailyValuesArray.forEach(cal => {
                const binIndex = Math.floor(cal / binSize);
                bins[binIndex]++;
            });

            let binLabels = [];
            for (let i = 0; i < numBins; i++) {
                binLabels.push(`${i * binSize} ~ ${i * binSize + binSize - 1}`);
            }

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: binLabels,
                    datasets: [{ label: '出現日数 (頻度)', data: bins, backgroundColor: '#2ecc71' }]
                },
                options: { maintainAspectRatio: false, scales: { x: { title: { display: true, text: '摂取カロリー (kcal)' }}, y: { beginAtZero: true, ticks: { stepSize: 1 }, title: { display: true, text: '日数' } } } }
            });
        }
        
        saveToLocal();
    }

    function exportCSV() {
        if (appData.history.length === 0) return alert("記録がありません。");
        let csvContent = "日付,おやつ名,カロリー(kcal)\n";
        [...appData.history].sort((a, b) => new Date(a.date) - new Date(b.date)).forEach(r => {
            csvContent += `${r.date},${r.name},${r.cal}\n`;
        });
        const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", "diet_statistics.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    function clearAllData() {
        if(confirm("全リセットしますか？この操作は取り消せません。")) {
            localStorage.clear();
            location.reload();
        }
    }

    window.onload = () => { loadFromLocal(); updateDisplay(); };
</script>
</body>
</html>
